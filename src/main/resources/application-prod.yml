---
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}  # Resolves from the Docker environment
      connect-timeout: 2000ms
      client-type: lettuce
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  session:
    store-type: redis
    timeout: 15m  # Session expiration time
    redis:
      namespace: blog-app:session
      flush-mode: on_save
      save-mode: always

  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    org:
      springframework:
        web: INFO
        security: INFO
      hibernate:
        SQL: false
        type:
          descriptor:
            sql: false

app:
  kafka:
    enabled: false
