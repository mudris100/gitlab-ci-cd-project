---
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  profiles:
    active: h2

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  thymeleaf:
    prefix: "classpath:/templates/"
    suffix: ".html"
    cache: false

  flyway:
    enabled: true
    locations: "classpath:db/migration"
    baseline-on-migrate: true

  # Producer and Consumer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"

  # GitHub and Google
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:none}
            client-secret: ${GITHUB_CLIENT_SECRET:none}
            scope: "read:user,user:email"
          google:
            client-id: ${GOOGLE_CLIENT_ID:none}
            client-secret: ${GOOGLE_CLIENT_SECRET:none}
            scope: "openid, email, profile"

server:
  forward-headers-strategy: framework

app:
  kafka:
    enabled: true

logging:
  level:
    org:
      springframework:
        jdbc: DEBUG
        boot:
          autoconfigure:
            sql:
              init: DEBUG
        security: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
