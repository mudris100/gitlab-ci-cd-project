<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author profile</title>
    <th:block th:replace="~{fragments/common :: common-css}"></th:block>
    <th:block th:replace="~{fragments/common :: theme-script}"></th:block>
</head>

<body>
    <th:block th:replace="~{fragments/common :: navbar}"></th:block>

	<main class="container">
		<div class="card">
			<div class="text-center" style="margin-bottom: 30px;">
				<span style="font-size: 3rem;">👤</span>
				<h2 th:text="${author.username()}">Username</h2>
			</div>

			<div style="display: grid; gap: 15px; margin-bottom: 30px;">
				<div
					style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
					<span style="font-weight: bold;">ID:</span>
					<span th:text="${author.id()}">ID</span>
				</div>
				<div
					style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
					<span style="font-weight: bold;">Email:</span>
					<span th:text="${author.email()}">Email</span>
				</div>
				<div
					style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
					<span style="font-weight: bold;">Role:</span>
					<span class="badge badge-primary" th:text="${author.role()}">Role</span>
				</div>
			</div>

			<div style="display: flex; flex-direction: column; gap: 15px;">
				<a th:href="@{/admin/users/{id}/edit (id=${author.id()})}" class="btn btn-primary" style="width: 100%;">
					Edit Author
				</a>

				<form th:action="@{/admin/users/{id}/delete (id=${author.id()})}" th:method="POST">
					<button type="submit" class="btn btn-danger" style="width: 100%;"
						onclick="return confirm('Are you sure? This will delete the author and all their posts.')">
						Delete Author and All Posts
					</button>
				</form>
			</div>
		</div>
	</main>
</body>

</html>
