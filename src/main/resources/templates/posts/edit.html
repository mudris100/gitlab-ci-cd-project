<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <th:block th:replace="~{fragments/common :: common-css}"></th:block>
    <th:block th:replace="~{fragments/common :: theme-script}"></th:block>
</head>

<body>
    <th:block th:replace="~{fragments/common :: navbar}"></th:block>

    <main class="container">
        <div class="text-center page-header">
            <h1>Edit Post</h1>
            <p>Update your blog post details</p>
        </div>

        <div class="card">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">
                Post updated successfully!
            </div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">
                Error updating post
            </div>

            <form th:action="@{/posts/{id}/edit(id=${post.postId})}" method="post" th:object="${post}">
                <div class="form-group">
                    <label for="title">Title <span style="color: var(--danger-color);">*</span></label>
                    <input type="text" id="title" th:field="*{title}" required minlength="3"
                        placeholder="Enter an engaging title...">
                </div>

                <div class="form-group">
                    <label for="content">Content <span style="color: var(--danger-color);">*</span></label>
                    <textarea id="content" th:field="*{content}" required
                        placeholder="Share your thoughts with the world..." style="min-height: 200px;"
                        oninput="updateCharCount('content')"></textarea>
                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">
                        <span id="content-count">0</span> characters
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" th:field="*{status}">
                            <option value="DRAFT">Draft</option>
                            <option value="PUBLISHED">Published</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags</label>
                        <input type="text" id="tags" th:field="*{tags}"
                            placeholder="e.g., Java, Spring Boot, Web Development">
                    </div>
                </div>

                <div
                    style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                    <a href="/posts" class="btn" style="background: #e2e8f0; color: #4a5568;">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function updateCharCount(fieldId) {
            var field = document.getElementById(fieldId);
            var countSpan = document.getElementById(fieldId + '-count');
            if (field && countSpan) {
                countSpan.textContent = field.value.length;
            }
        }

        // Initialize character counts on page load
        document.addEventListener('DOMContentLoaded', function () {
            var content = document.getElementById('content');
            if (content) {
                updateCharCount('content');
            }
        });
    </script>
</body>

</html>
