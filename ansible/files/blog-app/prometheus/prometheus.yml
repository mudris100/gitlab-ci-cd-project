global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'blog-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['blog-app:8080']
        labels:
          service: blog-app
          environment: production
